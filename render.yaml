services:
  - type: web
    name: fox-bot
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx server/index.js
    envVars:
      - key: SESSION_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: BOT_DATA_DIR
        value: /opt/render/project/src/data
      - key: PORT
        generateValue: false
